name: Keep Supabase Alive

on:
  schedule:
    # Executa todos os dias às 10:00 UTC (07:00 Horário de Brasília)
    - cron: '0 10 * * *'
  workflow_dispatch: # Permite execução manual pelo GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging Supabase to prevent inactivity pause..."
          curl -X GET "$SUPABASE_URL" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
          echo "Ping executed!"
